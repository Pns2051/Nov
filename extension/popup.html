<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #333;
    }
    .view {
      display: none;
    }
    .view.active {
      display: block;
    }
    .code-block {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 6px;
      font-family: monospace;
      word-break: break-all;
      margin-bottom: 10px;
      font-size: 11px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status-area {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: gray;
      margin-right: 8px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2196F3;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>

  <div id="onboarding-view" class="view">
    <h2>🚀 Welcome</h2>
    <p>To use the system adblocker, run this command in your terminal/PowerShell to install the proxy:</p>
    <div class="code-block" id="os-command">Loading command...</div>
    <button id="copy-btn">Copy</button>
    <hr style="margin: 15px 0;">
    <p>After installing, check the connection:</p>
    <button id="check-connection-btn">Check Connection</button>
    <div id="connection-result" style="margin-top: 10px; font-weight: bold;"></div>
    <br>
    <button id="finish-setup-btn" disabled>Finish Setup</button>
  </div>

  <div id="main-view" class="view">
    <h2>AdBlocker Controller</h2>
    <div class="status-area">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>
    
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
      <b>Enable Blocking</b>
      <label class="switch">
        <input type="checkbox" id="blocking-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <button id="update-blocklist-btn" style="width: 100%;">Update Blocklists</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
